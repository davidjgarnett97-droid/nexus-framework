# Skill Registry — central routing, access control, and versioning
# Owner: Nexus | Maintained by: [OPERATOR]
# Format per skill:
#   maintainer:   agent responsible for keeping the skill correct
#   callers:      agents authorized to invoke (always includes maintainer + nexus)
#   version:      semantic version of the skill contract
#   status:       pending_migration | active | deprecated
#   triggers:     natural-language phrases that map to this skill
#   inputs:       expected input fields
#   outputs:      expected output fields
#
# DEPLOYMENT NOTE: The "callers" lists below use generic role names.
# Replace [orchestrator, domain_lead, vertex, nexus] with the actual agent
# names defined in your deployment before going live.

version: 1
last_updated: 2026-05-26  # migration complete — all 36 skills active (3 workflow stubs excluded)

